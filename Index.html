<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화학개론 중간고사 실전 시험지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .paper-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .print-line { border-bottom: 2px dashed #cbd5e1; }
        input[type="radio"]:checked + span { font-weight: bold; color: #4338ca; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 shadow-md shrink-0 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold cursor-pointer flex items-center" onclick="app.goHome()">
                <span class="text-2xl mr-2">📝</span> 실전! 영화학개론 중간고사
            </h1>
            <div class="text-sm bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 flex items-center">
                <span class="mr-2">누적 오답:</span>
                <span id="wrong-count" class="font-bold text-rose-400 text-lg">0</span>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow overflow-y-auto p-4 flex justify-center items-start pb-20">
        <div class="max-w-4xl w-full bg-white rounded-lg paper-shadow p-6 sm:p-10 mt-4 fade-in min-h-[80vh]" id="app-container">
            <!-- Content Rendered Here -->
        </div>
    </main>

    <script>
        // --- 1. 거대 문제 은행 DB (다방향/교차검증 완벽 반영) ---
        const questionDB = {
            mcq: [
                { id: 'm1', category: '개념->용어', q: "카메라 축은 고정된 상태에서, 렌즈만 위아래(상하)로 끄덕이듯 움직이는 기법은?", options: ["팬(Pan)", "틸트(Tilt)", "트래킹(Tracking)", "줌(Zoom)"], a: 1, exp: "축 고정 상태에서 상하 이동은 틸트, 좌우 이동은 팬입니다." },
                { id: 'm2', category: '용어->개념', q: "'음향 원근법(Sound Perspective)'에 대한 설명으로 가장 올바른 것은?", options: ["인물이 겪는 환청을 사실적으로 묘사하는 기법이다.", "대사와 음악을 제외한 모든 인공적인 효과음을 의미한다.", "음량의 크기나 반사음 비율을 조절하여 소리의 거리감과 공간감을 표현하는 기법이다.", "화면 밖에서 들려오는 전지적 시점의 해설이다."], a: 2, exp: "소리를 통해 대상이 얼마나 멀리 있는지(원근감)를 표현하는 것이 음향 원근법입니다." },
                { id: 'm3', category: '차이점 비교', q: "'트래킹 샷'과 '줌(Zoom)'의 근본적인 시각적 차이는 무엇인가?", options: ["트래킹은 가짜 움직임이고, 줌은 진짜 물리적 움직임이다.", "트래킹은 동기화된 움직임, 줌은 비동기화된 움직임이다.", "트래킹은 공간을 관통해 입체감이 살아나지만, 줌은 렌즈 조작으로 공간이 평면화(압축)된다.", "트래킹은 수평 이동만 가능하고, 줌은 수직 이동만 가능하다."], a: 2, exp: "트래킹은 물리적 이동(깊이감 증가), 줌은 광학적 확대(입체감 상실)라는 점이 핵심 차이입니다." },
                { id: 'm4', category: '개념->용어', q: "이야기 세계 '외부'에서 들려와 극 중 인물은 듣지 못하고 관객만 들을 수 있는 소리(예: 스코어 배경음악)는?", options: ["내재적 사운드", "외재적 사운드", "반사 음향", "룸톤"], a: 1, exp: "내부에서 발생해 인물도 듣는 소리는 내재적 사운드, 외부에서 덧입힌 소리는 외재적(논다이제틱) 사운드입니다." },
                { id: 'm5', category: '용어->개념', q: "3점 조명 중 '역광(Backlight)'의 가장 핵심적인 역할은 무엇인가?", options: ["피사체에 강한 그림자를 만들어 입체감을 부여한다.", "주광의 그림자를 부드럽게 완화시킨다.", "피사체의 윤곽선을 살려 대상을 배경으로부터 분리한다.", "화면 전체를 화사하고 그림자 없게 만든다."], a: 2, exp: "역광은 인물의 등 뒤에서 비추어 배경에 묻히지 않게 분리하는 역할을 합니다." },
                { id: 'm6', category: '차이점 비교', q: "'교차 편집'과 '평행 편집'의 차이점으로 가장 적절한 것은?", options: ["교차 편집은 한 공간 안에서, 평행 편집은 여러 공간에서 일어난다.", "교차 편집은 '동일한 시간대'에 벌어지는 일들을 엮고, 평행 편집은 '시간대가 달라도' 의미적 연관성으로 엮는다.", "교차 편집은 연속 편집의 일종이고, 평행 편집은 불연속 편집이다.", "교차 편집은 사운드가 없고, 평행 편집은 사운드가 있다."], a: 1, exp: "교차 편집은 동시성(예: 추격전)이 중요하며, 평행 편집은 시대/시간이 달라도 주제적 연관성으로 묶어냅니다." },
                { id: 'm7', category: '개념->용어', q: "피사체를 아래에서 위로 올려다보며 촬영하여 대상을 거대하거나 위협적, 권위 있게 보이도록 만드는 앵글은?", options: ["하이 앵글", "아이 레벨 샷", "버즈아이 샷", "로우 앵글"], a: 3, exp: "아래에서 위로 보는 것은 로우 앵글, 위에서 아래로 내려다보는 것은 하이 앵글입니다." },
                { id: 'm8', category: '용어->개념', q: "'동기화된 카메라 움직임(Motivated)'의 의미로 가장 적절한 것은?", options: ["감독의 철학적 메시지를 전달하기 위해 이유 없이 움직이는 카메라", "가변 초점 렌즈를 조작하여 다가가는 인상을 주는 카메라", "인물의 이동이나 시선을 따라가는 등 서사적으로 움직여야 할 뚜렷한 명분이 있는 카메라", "사운드 트랙의 비트에 맞춰 리드미컬하게 흔들리는 카메라"], a: 2, exp: "화면 내의 피사체(인물)의 행동이 동기가 되어 움직이는 카메라를 뜻합니다." }
            ],
            short: [
                { id: 's1', category: '샷의 크기', q: "공간의 전반적인 상황과 지리적 맥락을 한눈에 보여주기 위해, 인물보다 배경을 압도적으로 넓게 잡아 피사체가 점처럼 작게 보이게 하는 샷의 명칭은?", a: ["익스트림롱샷", "익스트림 롱 샷", "익스트림롱 샷", "extreme long shot"] },
                { id: 's2', category: '연속 편집', q: "대화하는 두 인물 사이에 가상의 선을 긋고, 카메라가 그 선을 넘지 않게 촬영하여 관객의 공간적 혼란(좌우 반전)을 막는 편집 규칙을 무엇이라 하는가? (OOO 체계/규칙)", a: ["180도체계", "180도 체계", "180도규칙", "180도 규칙", "180 degree system"] },
                { id: 's3', category: '조명', q: "명암 대비가 극도로 강하고 그림자를 많이 사용하여 스릴러, 공포, 필름 느와르 등에서 긴장감과 불안감을 조성할 때 주로 쓰는 조명 톤은?", a: ["로우키조명", "로우키 조명", "로우키", "로우 키", "low key"] },
                { id: 's4', category: '카메라 움직임', q: "특수 장비(조끼 등)를 촬영자 몸에 착용하여, 들고 뛰거나 걸어도 화면의 흔들림 없이 유려하고 부드러운 움직임을 만들어내는 촬영 기법은?", a: ["스테디캠", "스테디 캠", "steadicam"] },
                { id: 's5', category: '연속 편집', q: "앞 샷에서 소녀가 프레임 밖을 쳐다보고, 이어지는 샷에서 아이스크림을 보여주어 관객이 '소녀가 아이스크림을 본다'고 인과적으로 연결 짓게 만드는 편집 기법은? (OO 일치)", a: ["시선일치", "시선의 일치", "눈길대상일치", "눈길-대상 일치", "eyeline match"] },
                { id: 's6', category: '화면 전환', q: "앞 샷의 이미지가 서서히 사라짐과 동시에 다음 샷의 이미지가 서서히 나타나, 한동안 두 화면이 다중 노출처럼 겹쳐서 보이는 화면 전환 기법은?", a: ["디졸브", "dissolve"] },
                { id: 's7', category: '조명', q: "3점 조명 체계에서 피사체를 향하는 가장 강력한 메인 조명으로, 필연적으로 피사체에 가장 짙은 그림자를 만들어내는 조명의 명칭은?", a: ["주광", "키라이트", "키 라이트", "key light"] }
            ],
            essay: [
                { id: 'e1', category: '서술형 1: 샷 분석', 
                  q: "[문제] 비가 내리는 어두운 좁은 골목길에 노란 우비를 입은 6살 아이가 덩그러니 서 있는 모습을, 위층 창문 높이에서 멀리서 내려다보듯 찍은 스틸컷이 제시되었습니다. 교수님의 서술 기준(해석 금지, 문장형, 순서)에 맞춰 묘사하시오.", 
                  rubrics: ["감정적 해석/추측('무서워 보인다' 등)을 배제하고 사실만 묘사했는가?", "단어의 나열이 아니라 주어와 서술어를 갖춘 완전한 문장으로 적었는가?", "일관된 서술 순서(인물->배경->카메라->조명)를 지켰는가?"],
                  model: "화면 중앙에는 노란색 우비를 입은 어린아이가 서 있습니다. 아이의 주변으로는 비에 젖은 어둡고 좁은 골목길이 배경으로 위치해 있습니다. 이 샷은 아이가 위치한 공간 전체를 보여주는 익스트림 롱 샷(또는 롱 샷) 크기로 담아내고 있으며, 카메라는 위에서 아래로 내려다보는 하이 앵글로 촬영되었습니다. 조명은 전체적으로 명암 대비가 강하고 어두운 로우키 톤을 띠고 있습니다." },
                { id: 'e2', category: '서술형 2: 몽타주 3정의', 
                  q: "[문제] 몽타주의 세 가지 정의(프랑스, 미국/할리우드, 소비에트/러시아)를 서술하시오. (반드시 교수님이 제시한 분량 및 형태 규칙을 엄격히 지킬 것)", 
                  rubrics: ["세 국가(프랑스, 미국, 소비에트)의 개념이 모두 정확하게 들어갔는가?", "【절대 규칙】 길게 쓰지 않고 각각 한 문장씩, 총 세 문장으로만 압축하여 작성했는가?"],
                  model: "1. 프랑스 영화에서 몽타주란 샷과 샷을 결합하는 단순한 편집 기법 그 자체를 의미합니다.\n2. 미국(할리우드) 영화에서 몽타주란 내러티브를 위해 시공간을 압축하거나 확장하여 보여주는 편집 시퀀스를 지칭합니다.\n3. 소비에트(러시아) 영화에서 몽타주란 독립된 샷들의 변증법적 충돌을 통해 관객의 마음속에 새롭고 혁명적인 의미를 창조해내는 것을 뜻합니다." },
                { id: 'e3', category: '서술형 3: 편집 상상력', 
                  q: "[문제] '텅 빈 방에 홀로 서서 창밖을 멍하고 불안하게 바라보는 남자의 뒷모습' 샷이 있습니다. 이 남자가 느끼는 '세상과의 단절감, 극심한 무기력함'을 표현하기 위해 어떤 샷을 이어 붙일지 교재 2A, 2B 형식으로 명시하고, 그 연출적 의도를 서술하시오.", 
                  rubrics: ["이어붙일 샷의 형태(거리, 앵글 등)를 구체적으로 제시했는가? (예: 익스트림 롱 샷, 하이 앵글)", "【핵심 감점 요인】 단순히 샷만 묘사하지 않고, 왜 그 샷을 붙였는지 '연출적 의도(이유)'를 반드시 논리적으로 서술했는가?", "두 샷의 대조나 충돌을 통해 인물의 심리를 시각화하려는 시도가 있었는가?"],
                  model: "[이어질 샷] 건물 바깥에서 남자가 서 있는 창문을 올려다보는 매우 높은 로우 앵글(혹은 하이 앵글)의 익스트림 롱 샷을 배치하겠습니다.\n\n[연출 의도(이유)] 이렇게 샷을 이어 붙인 의도는, 압도적으로 거대한 건물 외벽과 그 속에 점처럼 작게 고립된 남자의 모습을 극명하게 대조시켜, 주인공이 현재 겪고 있는 극심한 심리적 단절감과 혼란, 세상 앞에서의 무기력함을 관객에게 시각적으로 극대화하여 전달하기 위함입니다." },
                { id: 'e4', category: '서술형 1: 샷 분석', 
                  q: "[문제] 밝은 카페 창가에 앉아있는 20대 여성의 얼굴을 화면 가득 담은 샷입니다. 여성은 오른쪽을 바라보고 있고 왼쪽 창가에서 햇빛이 강하게 들어옵니다. 교수님의 묘사 기준에 맞춰 서술하시오.", 
                  rubrics: ["감정적 해석을 배제하고 보이는 구성 요소만 사실적으로 묘사했는가?", "단어의 나열이 아니라 완전한 문장으로 적었는가?", "인물, 배경, 샷 크기, 앵글, 조명 방향 등이 체계적으로 포함되었는가?"],
                  model: "화면 중앙에는 20대 여성이 오른쪽을 응시하고 있는 얼굴이 배치되어 있습니다. 인물의 뒤로는 환한 카페 내부가 배경으로 보입니다. 이 샷은 인물의 표정을 포착하기 위해 얼굴을 화면 가득 채운 클로즈업 샷이며, 자연스러운 눈높이인 아이 레벨 앵글로 촬영되었습니다. 조명은 화면 좌측(창가)에서 주광이 강하게 들어와 얼굴 왼쪽은 밝고 오른쪽에는 짙은 그림자가 형성되어 있습니다." }
            ]
        };

        // --- 2. Application State ---
        const app = {
            examPaper: [],       // Array of 9 question objects
            userAnswers: {},     // { id: answer_value }
            wrongQuestions: new Set(),
            isSubmitted: false,
            mode: 'normal',
            
            init() {
                const saved = localStorage.getItem('movieMidtermWrongs');
                if(saved) this.wrongQuestions = new Set(JSON.parse(saved));
                this.updateWrongCount();
                this.goHome();
            },

            updateWrongCount() {
                document.getElementById('wrong-count').innerText = this.wrongQuestions.size;
                localStorage.setItem('movieMidtermWrongs', JSON.stringify([...this.wrongQuestions]));
            },

            goHome() {
                this.isSubmitted = false;
                this.userAnswers = {};
                const container = document.getElementById('app-container');
                container.innerHTML = `
                    <div class="text-center fade-in py-10">
                        <div class="inline-block bg-indigo-100 text-indigo-800 px-4 py-1 rounded-full font-bold text-sm mb-4">건국대 영화학개론 맞춤형</div>
                        <h2 class="text-3xl font-black text-slate-800 mb-4">실전 중간고사 모의 테스트</h2>
                        <p class="text-slate-600 mb-10 leading-relaxed text-lg">
                            실제 시험과 완벽히 동일한 <b class="text-indigo-600">객관식 3 + 단답형 3 + 서술형 3</b> 구조입니다.<br>
                            서술형은 제출 후 교수님의 채점 루브릭을 통해 스스로 자가 진단하게 됩니다.
                        </p>
                        
                        <div class="space-y-4 max-w-md mx-auto">
                            <button onclick="app.startExam('normal')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition transform hover:-translate-y-1 flex items-center justify-center text-lg">
                                📝 실전 모의고사 시작하기
                            </button>
                            
                            <button onclick="app.startExam('review')" class="w-full ${this.wrongQuestions.size > 0 ? 'bg-rose-500 hover:bg-rose-600 shadow-lg transform hover:-translate-y-1' : 'bg-slate-300 cursor-not-allowed opacity-70'} text-white font-bold py-4 px-6 rounded-xl transition flex items-center justify-center text-lg" ${this.wrongQuestions.size === 0 ? 'disabled' : ''}>
                                🔍 오답 노트만 다시 풀기 (${this.wrongQuestions.size}개)
                            </button>
                            
                            <button onclick="app.clearWrongs()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 px-6 rounded-xl transition duration-200 mt-6 text-sm">
                                🗑 오답 노트 초기화
                            </button>
                        </div>
                    </div>
                `;
            },

            clearWrongs() {
                if(confirm('기록된 오답 노트를 모두 초기화하시겠습니까?')) {
                    this.wrongQuestions.clear();
                    this.updateWrongCount();
                    this.goHome();
                }
            },

            getRandomItems(arr, num) {
                const shuffled = [...arr].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, num);
            },

            startExam(mode) {
                window.scrollTo(0, 0);
                this.mode = mode;
                this.isSubmitted = false;
                this.userAnswers = {};
                this.examPaper = [];

                if(mode === 'normal') {
                    // Exact 3+3+3 logic
                    this.examPaper = [
                        ...this.getRandomItems(questionDB.mcq, 3),
                        ...this.getRandomItems(questionDB.short, 3),
                        ...this.getRandomItems(questionDB.essay, 3)
                    ];
                } else {
                    // Review mode: pull all wrong ones, separate by type
                    const wrongs = { mcq: [], short: [], essay: [] };
                    this.wrongQuestions.forEach(id => {
                        let q = questionDB.mcq.find(x => x.id === id);
                        if(q) { wrongs.mcq.push(q); return; }
                        q = questionDB.short.find(x => x.id === id);
                        if(q) { wrongs.short.push(q); return; }
                        q = questionDB.essay.find(x => x.id === id);
                        if(q) { wrongs.essay.push(q); return; }
                    });
                    
                    // Shuffle each and combine
                    this.examPaper = [
                        ...this.getRandomItems(wrongs.mcq, wrongs.mcq.length),
                        ...this.getRandomItems(wrongs.short, wrongs.short.length),
                        ...this.getRandomItems(wrongs.essay, wrongs.essay.length)
                    ];
                }

                this.renderPaper();
            },

            renderPaper() {
                const container = document.getElementById('app-container');
                let html = `
                    <div class="border-b-4 border-slate-800 pb-4 mb-8">
                        <h2 class="text-3xl font-black text-slate-800">영화학개론 중간고사</h2>
                        <div class="flex justify-between mt-2 text-slate-500 font-semibold">
                            <span>건국대학교 미래지식교육원</span>
                            <span>총 ${this.examPaper.length}문항</span>
                        </div>
                    </div>
                `;

                let currentType = '';
                
                this.examPaper.forEach((q, idx) => {
                    // Render Section Headers
                    let qType = q.id.startsWith('m') ? '객관식' : q.id.startsWith('s') ? '단답형' : '서술형';
                    if (currentType !== qType) {
                        currentType = qType;
                        html += `<h3 class="text-xl font-bold bg-slate-100 text-slate-700 p-3 rounded-lg mt-10 mb-6 print-line flex items-center">
                                    <span class="bg-slate-800 text-white text-sm px-3 py-1 rounded-full mr-3">제 ${currentType === '객관식'?1:currentType==='단답형'?2:3}영역</span> ${currentType}
                                 </h3>`;
                    }

                    // Question Block
                    html += `
                        <div class="mb-10 p-4 hover:bg-slate-50 rounded-xl transition" id="block-${q.id}">
                            <div class="flex items-start mb-4">
                                <span class="text-2xl font-black text-indigo-600 mr-3 mt-[-2px]">${idx + 1}.</span>
                                <div class="w-full">
                                    <div class="mb-2">
                                        <span class="text-xs font-bold text-indigo-500 border border-indigo-200 rounded px-2 py-1">${q.category}</span>
                                    </div>
                                    <h4 class="text-lg font-bold text-slate-800 leading-relaxed">${q.q.replace(/\n/g, '<br>')}</h4>
                                </div>
                            </div>
                    `;

                    // Input Areas
                    if (q.id.startsWith('m')) {
                        html += `<div class="space-y-2 pl-8">`;
                        q.options.forEach((opt, optIdx) => {
                            html += `
                                <label class="flex items-start p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-indigo-50 hover:border-indigo-300 transition group">
                                    <input type="radio" name="q_${q.id}" value="${optIdx}" class="mt-1 mr-3 w-4 h-4 text-indigo-600" onchange="app.saveAnswer('${q.id}', ${optIdx})">
                                    <span class="text-slate-700 leading-relaxed group-hover:text-indigo-900">${optIdx+1}) ${opt}</span>
                                </label>
                            `;
                        });
                        html += `</div>`;
                    } else if (q.id.startsWith('s')) {
                        html += `
                            <div class="pl-8">
                                <input type="text" id="input_${q.id}" class="w-full border-b-2 border-slate-300 p-3 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:outline-none transition text-lg font-semibold text-slate-800" placeholder="정답을 입력하세요" onchange="app.saveAnswer('${q.id}', this.value)">
                            </div>
                        `;
                    } else if (q.id.startsWith('e')) {
                        html += `
                            <div class="pl-8">
                                <textarea id="input_${q.id}" rows="5" class="w-full border border-slate-300 rounded-lg p-4 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 focus:outline-none transition text-base leading-relaxed" placeholder="답안을 서술하세요..." onchange="app.saveAnswer('${q.id}', this.value)"></textarea>
                            </div>
                        `;
                    }

                    // Feedback Area (Hidden initially)
                    html += `<div id="fb-${q.id}" class="hidden mt-6 pl-8 fade-in"></div></div>`;
                });

                html += `
                    <div class="mt-12 text-center print-line pt-8">
                        <button onclick="app.submitExam()" id="submit-btn" class="bg-slate-900 hover:bg-black text-white font-black text-xl py-5 px-12 rounded-xl shadow-xl transition transform hover:scale-105">
                            시험지 제출 및 채점하기
                        </button>
                    </div>
                `;

                container.innerHTML = html;
            },

            saveAnswer(qId, val) {
                this.userAnswers[qId] = val;
            },

            submitExam() {
                if(!confirm('답안을 모두 작성하셨습니까? 제출 후 채점이 시작됩니다.')) return;
                
                this.isSubmitted = true;
                document.getElementById('submit-btn').classList.add('hidden');
                
                let objScore = 0;
                let objTotal = 0;

                this.examPaper.forEach(q => {
                    const fbDiv = document.getElementById(`fb-${q.id}`);
                    const userAns = this.userAnswers[q.id];
                    let isCorrect = false;

                    // Disable inputs
                    if (q.id.startsWith('m')) {
                        document.getElementsByName(`q_${q.id}`).forEach(el => el.disabled = true);
                    } else {
                        const inputEl = document.getElementById(`input_${q.id}`);
                        if(inputEl) inputEl.disabled = true;
                    }

                    // Grade MCQ & Short
                    if (q.id.startsWith('m') || q.id.startsWith('s')) {
                        objTotal++;
                        if (q.id.startsWith('m')) {
                            isCorrect = parseInt(userAns) === q.a;
                        } else if (q.id.startsWith('s')) {
                            const val = (userAns || '').replace(/\s+/g, '').toLowerCase();
                            isCorrect = q.a.some(ans => val === ans.replace(/\s+/g, '').toLowerCase());
                        }

                        if(isCorrect) {
                            objScore++;
                            this.wrongQuestions.delete(q.id);
                        } else {
                            this.wrongQuestions.add(q.id);
                        }

                        fbDiv.innerHTML = `
                            <div class="p-4 rounded-lg border-2 ${isCorrect ? 'bg-green-50 border-green-400' : 'bg-red-50 border-red-400'}">
                                <div class="flex items-center mb-2 font-black text-lg ${isCorrect ? 'text-green-700' : 'text-red-700'}">
                                    ${isCorrect ? '✅ 정답입니다' : '❌ 오답입니다'}
                                </div>
                                ${!isCorrect && q.id.startsWith('m') ? `<div class="text-sm text-red-600 mb-2">정답: ${q.a+1}) ${q.options[q.a]}</div>` : ''}
                                ${!isCorrect && q.id.startsWith('s') ? `<div class="text-sm text-red-600 mb-2">정답: ${q.a[0]}</div>` : ''}
                                <div class="text-slate-700 text-sm mt-3 pt-3 border-t border-dashed ${isCorrect ? 'border-green-200' : 'border-red-200'}">
                                    <span class="font-bold">💡 해설:</span> ${q.exp}
                                </div>
                            </div>
                        `;
                        fbDiv.classList.remove('hidden');
                    } 
                    // Self Grade Essay
                    else if (q.id.startsWith('e')) {
                        let rubricsHtml = q.rubrics.map(r => `<li><label class="flex items-start"><input type="checkbox" class="mt-1 mr-2 w-4 h-4 text-indigo-600"> <span>${r}</span></label></li>`).join('');
                        
                        fbDiv.innerHTML = `
                            <div class="p-5 rounded-xl border-2 border-indigo-400 bg-indigo-50">
                                <h4 class="font-black text-indigo-800 text-lg mb-4 flex items-center">
                                    <span class="text-2xl mr-2">👨‍🏫</span> 교수님의 채점 기준 (루브릭)
                                </h4>
                                <ul class="space-y-3 mb-6 text-slate-700 bg-white p-4 rounded-lg border border-indigo-100 shadow-sm">
                                    ${rubricsHtml}
                                </ul>
                                
                                <div class="mb-6">
                                    <h5 class="font-bold text-green-700 mb-2">✅ 모범 답안 예시</h5>
                                    <div class="bg-white p-4 rounded-lg border border-green-200 text-slate-700 whitespace-pre-wrap leading-relaxed text-sm">${q.model}</div>
                                </div>

                                <div class="text-center pt-6 border-t-2 border-indigo-200" id="eval-box-${q.id}">
                                    <p class="font-bold text-slate-800 mb-4 text-lg">스스로 평가해 보세요. 위 기준을 모두 통과했습니까?</p>
                                    <div class="flex space-x-4 justify-center">
                                        <button onclick="app.finishEssayEval('${q.id}', true)" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg shadow transition">네, 완벽히 서술했습니다</button>
                                        <button onclick="app.finishEssayEval('${q.id}', false)" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-8 rounded-lg shadow transition">아니요, 부족합니다</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        fbDiv.classList.remove('hidden');
                    }
                });

                this.updateWrongCount();
                
                // Show floating result summary if no essays, or just wait.
                const essayCount = this.examPaper.filter(q => q.id.startsWith('e')).length;
                if(essayCount === 0) {
                    this.showFinalSummary();
                } else {
                    window.scrollTo({ top: document.getElementById('submit-btn').offsetTop - 300, behavior: 'smooth' });
                }
            },

            finishEssayEval(qId, isCorrect) {
                if(isCorrect) this.wrongQuestions.delete(qId);
                else this.wrongQuestions.add(qId);
                this.updateWrongCount();

                const box = document.getElementById(`eval-box-${qId}`);
                box.innerHTML = `
                    <div class="font-black text-xl ${isCorrect ? 'text-green-600' : 'text-rose-600'}">
                        ${isCorrect ? '✅ 스스로 정답 처리했습니다.' : '❌ 스스로 오답 처리했습니다. (오답노트 추가됨)'}
                    </div>
                `;

                // Check if all essays are evaluated
                let allEvaluated = true;
                this.examPaper.forEach(q => {
                    if(q.id.startsWith('e') && document.getElementById(`eval-box-${q.id}`).querySelector('button')) {
                        allEvaluated = false;
                    }
                });

                if(allEvaluated) this.showFinalSummary();
            },

            showFinalSummary() {
                const container = document.getElementById('app-container');
                let summaryDiv = document.createElement('div');
                summaryDiv.className = "mt-10 p-8 bg-slate-900 text-white rounded-2xl text-center fade-in paper-shadow";
                summaryDiv.innerHTML = `
                    <h2 class="text-3xl font-black mb-4">시험 종료 및 채점 완료</h2>
                    <p class="text-slate-300 mb-8 text-lg">수고하셨습니다! 틀렸거나 부족한 부분은 반드시 오답 노트를 통해 복습하세요.</p>
                    <div class="flex justify-center space-x-4">
                        <button onclick="app.goHome()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-8 rounded-xl transition text-lg shadow-lg">메인 화면으로</button>
                    </div>
                `;
                container.appendChild(summaryDiv);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => { app.init(); });
    </script>
</body>
</html>
